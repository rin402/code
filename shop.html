<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hello Kitty 商城</title>
<style>
body{
    margin:0;
    background:url(https://haowallpaper.com/link/common/file/getCroppingImg/17950582360755584) center/cover fixed no-repeat;
    font-family:"Microsoft YaHei";
}
.header{background:#FF9ECF; color:white; padding:15px; text-align:center; position:relative;}
.gotoCart{position:absolute; right:20px; top:15px; background:white; color:#FF69B4; border:none; padding:6px 14px; border-radius:15px; cursor:pointer;}

/* 分类标题 */
.category{
  max-width:1200px;
  margin:25px auto 5px;
  padding-left:10px;
  font-size:19px;
  font-weight:bold;
  color:#FF5988;
}

/* 商品布局 */
.container{
  max-width:1200px;
  margin:0 auto 20px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.item {
    background:#FFF9FC;
    border-radius:18px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    transition:0.3s;
}
.item img {
    width: auto !important;
    height: auto !important;
    max-width: 100%;
    border-radius:12px;
}
.item:hover {
    transform:translateY(-5px);
    background:#FFD6E4;
}
.item h3{
  color:#FF69B4;
  margin:10px 0;
  font-size:16px;
}
.item button{
  background:#FF69B4;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
}

/* 右侧购物车 */
.cart-box{
  position:fixed;
  right:20px;
  top:100px;
  width:260px;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px #ffc0d0;
}
.cart-box h2{
  color:#FF69B4;
  text-align:center;
  margin-bottom:10px;
  font-size:20px;
}
.cart-list{
  list-style:none;
  padding:0;
  max-height:350px;
  overflow-y:auto;
}
.cart-list li{
  padding:8px 5px;
  border-bottom:1px solid #FFD1DC;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}
.del{
  background:#FF4470;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
  padding:2px 6px;
  font-size:12px;
}
</style>
</head>
<body>

<div class="header">
  🎀 Hello Kitty 官方商城
  <button class="gotoCart" onclick="location.href='cart.html'">查看购物车</button>
</div>

<!-- ===================== 分类1：可爱玩偶 ===================== -->
<div class="category">🧸 可爱玩偶类</div>
<div class="container">
  <div class="item">
    <img src="https://m.360buyimg.com/mobilecms/s750x750_jfs/t1/135676/6/24285/262038/623438c6Ee4457c65/0ca1cf85958a2998.jpg!q80.dpg">
    <h3>Hello Kitty 玩偶</h3>
    <button onclick="add(1,'Hello Kitty 玩偶',this.src)">加入购物车</button>
  </div>
  <div class="item">
    <img src="https://cbu01.alicdn.com/img/ibank/O1CN01FDnhxv1bndGBhuv9l_!!1669653510-0-cib.310x310.jpg">
    <h3>KT 坐姿公仔</h3>
    <button onclick="add(2,'KT 坐姿公仔',this.src)">加入购物车</button>
  </div>
  <div class="item">
    <img src="https://ts4.tc.mm.bing.net/th/id/OIP-C.SsjAggVtGtyrmvSeo3lINAHaG7?rs=1&pid=ImgDetMain&o=7&rm=3">
    <h3>KT 超大抱枕</h3>
    <button onclick="add(3,'KT 超大抱枕',this.src)">加入购物车</button>
  </div>
  <div class="item">
    <img src="https://ts4.tc.mm.bing.net/th/id/OIP-C.9IQeavyBvnLX59l3CD26DwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3">
    <h3>KT 毛绒挂件</h3>
    <button onclick="add(4,'KT 毛绒挂件',this.src)">加入购物车</button>
  </div>
</div>

<!-- ===================== 分类2：生活用品 ===================== -->
<div class="category">☕ 生活用品类</div>
<div class="container">
  <div class="item">
    <img src="https://ts2.tc.mm.bing.net/th/id/OIP-C.Eix_fsqiENHDW0Xe_nyJ1QAAAA?rs=1&pid=ImgDetMain&o=7&rm=3">
    <h3>Hello Kitty 水杯</h3>
    <button onclick="add(5,'Hello Kitty 水杯',this.src)">加入购物车</button>
  </div>
  <div class="item">
    <img src="https://img.alicdn.com/bao/uploaded/i1/2208615795356/O1CN01Teld6e1pR6DQRHkKP_!!2208615795356.jpg">
    <h3>KT 保温杯</h3>
    <button onclick="add(6,'KT 保温杯',this.src)">加入购物车</button>
  </div>
  <div class="item">
    <img src="https://ts3.tc.mm.bing.net/th/id/OIP-C.2flGstGIwdVL0GMq6hM6RwAAAA?rs=1&pid=ImgDetMain&o=7&rm=3">
    <h3>KT 晴雨伞</h3>
    <button onclick="add(7,'KT 晴雨伞',this.src)">加入购物车</button>
  </div>
  <div class="item">
    <img src="https://ts1.tc.mm.bing.net/th/id/OIP-C.T36qb75Fj7GFJoT9ozLIMgAAAA?rs=1&pid=ImgDetMain&o=7&rm=3">
    <h3>KT 手提袋</h3>
    <button onclick="add(8,'KT 手提袋',this.src)">加入购物车</button>
  </div>

<!-- ===================== 分类3：文具饰品 ===================== -->
<div class="category">✏️ 文具饰品类</div>
<div class="container">
  <div class="item">
    <img src="https://ts3.tc.mm.bing.net/th/id/OIP-C.Ks20sBJ55BEfS2CcjJ4h6QHaHa?rs=1&pid=ImgDetMain&o=7&rm=3">
    <h3>KT 文具套装</h3>
    <button onclick="add(9,'KT 文具套装',this.src)">加入购物车</button>
  </div>
  <div class="item">
    <img src="https://img.alicdn.com/imgextra/i2/2070167818/O1CN01t4wALt27chRvtUQux_!!2070167818.jpg">
    <h3>KT 可爱头箍</h3>
    <button onclick="add(10,'KT 可爱头箍',this.src)">加入购物车</button>
  </div>
  <div class="item">
    <img src="https://img14.360buyimg.com/n1/s720x720_jfs/t1/321071/3/8340/101318/684a7cb2F70e37eff/9905aad81431ee9b.jpg">

    <button onclick="add(11,'KT 发夹套装',this.src)">加入购物车</button>
  </div>
  <div class="item">
    <img src="https://ts2.tc.mm.bing.net/th/id/OIP-C.IDa_EbSDbYAv7E-DAdpHUwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3">
    <h3>KT 笔记本</h3>
    <button onclick="add(12,'KT 笔记本',this.src)">加入购物车</button>
  </div>
</div>

<!-- 右侧购物车 -->
<div class="cart-box">
  <h2>🛒 购物车</h2>
  <ul class="cart-list" id="cartList"></ul>
</div>

<script>
function getCart(){let d=localStorage.getItem("cart");return d?JSON.parse(d):[];}
function saveCart(a){localStorage.setItem("cart",JSON.stringify(a));}
function add(id,name,img){let cart=getCart();cart.push({id,name,img});saveCart(cart);alert("加入成功！");load();}
function del(i){let cart=getCart();cart.splice(i,1);saveCart(cart);load();}
function load(){
    let list=document.getElementById("cartList");
    if(!list)return;
    list.innerHTML="";
    let data=getCart();
    data.forEach((item,i)=>{
        let li=document.createElement("li");
        li.innerHTML=item.name+" <button class='del' onclick='del("+i+")'>删除</button>";
        list.appendChild(li);
    });
}
window.onload=load;
</script>
</body>
</html>
