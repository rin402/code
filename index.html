<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hello Kitty 登录</title>
<style>
*{box-sizing:border-box;}
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url(https://i.imgur.com/9kXQ9fY.jpg) center center / cover no-repeat;
    font-family:"Microsoft YaHei";
}
.login-card{
    background:white;
    padding:50px 40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:380px;
    text-align:center;
}
.login-card h2{
    color:#FF69B4;
    margin:0 0 30px;
    font-size:26px;
}
input{
    width:100%;
    padding:14px 16px;
    margin:10px 0;
    border:2px solid #FFC0D9;
    border-radius:12px;
    outline:none;
    font-size:15px;
}
input:focus{
    border-color:#FF69B4;
}
button{
    width:100%;
    padding:14px;
    margin-top:15px;
    background:#FF69B4;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    background:#FF5999;
}
</style>
</head>
<body>
<div class="login-card">
    <h2>🎀 Hello Kitty 商城</h2>
    <input id="user" placeholder="请输入用户名">
    <input id="pwd" type="password" placeholder="请输入密码">
    <button onclick="login()">登录</button>
</div>
<script>
function login(){
    let user=document.getElementById("user").value;
    let pwd=document.getElementById("pwd").value;
    if(user&&pwd) {
        // 跳转到商城页面
        location.href="shop.html";
    } else {
        alert("请输入账号和密码！");
    }
}
</script>
</body>
</html>
